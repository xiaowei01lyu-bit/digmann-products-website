[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build]
  command = "echo 'Deploying DIGMANN PRODUCTS...'"
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
